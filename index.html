<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="Js/script.js"></script>

</head>

<body>
    <div id="overlay" class="overlay" style="display: none;">
        <div class="modal"> <!--alert customizado-->
            <p id="mensagem"></p>
            <button onclick="fecharOverlay()">Fechar</button>
        </div>
    </div>

    <H1>Cadastro</H1>

    <Form id="form-cadastro" onsubmit="cadastrar(event)">
        <label for="input-nome">Digite seu nome</label>
        <input id="input-nome" placeholder="nome" type="text" required>
        <br></br>

        <label for="input-email">Insira o e-mail</label>
        <input id="input-email" placeholder="email@mail.com" type="email" required>
        <br></br>

        <label for="input-senha">Digite uma nova senha</label>
        <input id="input-senha" placeholder="senha" type="password" required>
        <br></br>

        <button id="btn-cadastrar" type="submit">Cadastrar</button><br>
        <button onclick="verCadastrados()" class="button-cadastrados">Ver Cadastrados</button>

    </Form>


</body>

</html>
